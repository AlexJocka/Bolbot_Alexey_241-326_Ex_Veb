{% macro render_book_form(form, genres, selected_genre_ids, action, with_cover) %}
<form method="post" action="{{ action }}" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label" for="title">Название</label>
        <input class="form-control" id="title" name="title" value="{{ form.title }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label" for="short_description">Краткое описание</label>
        <textarea class="form-control" id="short_description" name="short_description" rows="8" required>{{ form.short_description }}</textarea>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label" for="year">Год</label>
            <input class="form-control" id="year" name="year" value="{{ form.year }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label" for="publisher">Издательство</label>
            <input class="form-control" id="publisher" name="publisher" value="{{ form.publisher }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label" for="pages">Объём, страниц</label>
            <input class="form-control" id="pages" name="pages" value="{{ form.pages }}" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label" for="author">Автор</label>
        <input class="form-control" id="author" name="author" value="{{ form.author }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label" for="genre_ids">Жанры</label>
        <select class="form-select" id="genre_ids" name="genre_ids" multiple required>
            {% for genre in genres %}
                <option value="{{ genre.id }}" {% if genre.id in selected_genre_ids %}selected{% endif %}>{{ genre.name }}</option>
            {% endfor %}
        </select>
        <div class="form-text">Можно выбрать несколько жанров.</div>
    </div>

    {% if with_cover %}
    <div class="mb-3">
        <label class="form-label" for="cover">Обложка</label>
        <input class="form-control" id="cover" name="cover" type="file" accept="image/*" required>
    </div>
    {% endif %}

    <button class="btn btn-dark" type="submit">Сохранить</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('books.index') }}">Отмена</a>
</form>
{% endmacro %}
